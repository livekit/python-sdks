name: Publish to PyPI

on:
  # Step 1: Dispatch creates a version bump PR
  workflow_dispatch:
    inputs:
      version:
        description: "What to publish"
        type: choice
        required: true
        options:
          - "patch       (1.5.1 → 1.5.2)"
          - "minor       (1.5.1 → 1.6.0)"
          - "major       (1.5.1 → 2.0.0)"
          - "patch-rc    (1.5.1 → 1.5.2.rc1)"
          - "minor-rc    (1.5.1 → 1.6.0.rc1)"
          - "major-rc    (1.5.1 → 2.0.0.rc1)"
          - "next-rc     (.rc1 → .rc2)"
          - "promote     (1.6.0.rc2 → 1.6.0)"
      branch:
        description: "Branch to publish from (default: main)"
        type: string
        required: false
        default: "main"

  # Step 2: Merging the release PR triggers build + publish
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ── Step 1: Create a version bump PR ──────────────────────────
  bump:
    name: Create release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: true

      - name: Guard non-main branches
        run: |
          key=$(echo "${{ inputs.version }}" | awk '{print $1}')
          branch="${{ inputs.branch }}"
          if [ "$branch" != "main" ]; then
            case "$key" in
              *-rc|next-rc) ;; # allowed
              *) echo "::error::Only RC releases are allowed from non-main branches (got '$key' on '$branch')"; exit 1 ;;
            esac
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install click packaging

      - name: Bump versions
        run: |
          key=$(echo "${{ inputs.version }}" | awk '{print $1}')

          case "$key" in
            patch|minor|major)
              python .github/update_versions.py bump --bump-type "$key"
              ;;
            patch-rc|minor-rc|major-rc)
              bump="${key%-rc}"
              python .github/update_versions.py bump --bump-type "$bump"
              python .github/update_versions.py bump --pre rc
              ;;
            next-rc)
              python .github/update_versions.py bump --pre rc
              ;;
            promote)
              python .github/update_versions.py bump --bump-type release
              ;;
          esac

      - name: Read new version
        id: version
        run: |
          version=$(python -c "
          import re, pathlib
          m = re.search(r'__version__\s*=\s*[\"'\''](.*?)[\"'\'']', pathlib.Path('livekit-rtc/livekit/rtc/version.py').read_text())
          print(m.group(1))
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "New version: $version"

      - name: Close existing release PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any open PRs from release/* branches
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("release/v")) | .number' | while read -r pr; do
            echo "Superseding release PR #$pr"
            gh pr comment "$pr" --body "Superseded by a new release."
            gh pr close "$pr" --delete-branch || true
          done

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          branch="release/v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "v${version}"
          git push --force origin "$branch"

          gh pr create \
            --base "${{ inputs.branch }}" \
            --head "$branch" \
            --title "v${version}" \
            --body "Merging this PR will publish all packages as **v${version}** to PyPI." \
            --label "release"

  # ── Step 2: Publish on merge ──────────────────────────────────
  build-rtc:
    name: Build RTC wheels (${{ matrix.archs }})
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
          - os: namespace-profile-default-arm64
            archs: aarch64
          - os: windows-latest
            archs: AMD64
          - os: macos-latest
            archs: x86_64 arm64
    defaults:
      run:
        working-directory: ./livekit-rtc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.11"

      - name: Build wheels
        run: pipx run --python '${{ steps.setup-python.outputs.python-path }}' cibuildwheel==3.3.1 --output-dir dist
        env:
          CIBW_ARCHS: ${{ matrix.archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-rtc-${{ matrix.os }}
          path: livekit-rtc/dist/*.whl

  build-rtc-sdist:
    name: Build RTC sdist
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./livekit-rtc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build sdist
        run: |
          pip3 install build
          python3 -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-rtc-sdist
          path: livekit-rtc/dist/*.tar.gz

  build-api:
    name: Build API
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./livekit-api
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v4

      - name: Build wheel & sdist
        run: |
          pip3 install build wheel
          python3 -m build --wheel --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-api
          path: |
            livekit-api/dist/*.whl
            livekit-api/dist/*.tar.gz

  build-protocol:
    name: Build Protocol
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./livekit-protocol
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v4

      - name: Build wheel & sdist
        run: |
          pip3 install build wheel
          python3 -m build --wheel --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-protocol
          path: |
            livekit-protocol/dist/*.whl
            livekit-protocol/dist/*.tar.gz

  tag:
    name: Tag release
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          version="${{ github.event.pull_request.head.ref }}"
          version="${version#release/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$version"
          git push origin "$version"

  publish-rtc:
    name: Publish livekit (RTC)
    needs: [build-rtc, build-rtc-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-rtc-*
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-api:
    name: Publish livekit-api
    needs: [build-api]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-api
          path: dist/

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-protocol:
    name: Publish livekit-protocol
    needs: [build-protocol]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-protocol
          path: dist/

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    name: Build docs (${{ matrix.package_name }})
    needs: [publish-rtc, publish-api, publish-protocol]
    strategy:
      matrix:
        include:
          - package_dir: livekit-rtc
            package_name: livekit.rtc
          - package_dir: livekit-api
            package_name: livekit.api
          - package_dir: livekit-protocol
            package_name: livekit.protocol
    uses: ./.github/workflows/build-docs.yml
    with:
      package_dir: ${{ matrix.package_dir }}
      package_name: ${{ matrix.package_name }}
    secrets: inherit
