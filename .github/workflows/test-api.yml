name: Test API

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  failover:
    runs-on: ubuntu-latest
    services:
      mock-server:
        image: livekit/test-server:latest
        ports:
          - 9999:9999
          - 10000:10000
          - 10001:10001
          - 10002:10002
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install livekit-api (without livekit-rtc)
        run: |
          uv venv .failover-venv
          source .failover-venv/bin/activate
          uv pip install ./livekit-protocol ./livekit-api pytest aiohttp

      - name: Wait for mock server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9999/settings/regions >/dev/null && exit 0
            sleep 1
          done
          echo "mock server did not become ready" && exit 1

      - name: Run API tests
        run: |
          source .failover-venv/bin/activate
          pytest tests/api -v
